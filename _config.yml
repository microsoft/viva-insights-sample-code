# Jekyll configuration for GitHub Pages
title: "Viva Insights Sample Code Library"
description: "Sample code, tutorials, and AI prompt libraries for Microsoft Viva Insights analytics in R and Python."
baseurl: "/viva-insights-sample-code"
url: "https://microsoft.github.io"

# Branding & social sharing (consumed by jekyll-seo-tag)
logo: /assets/images/apple-touch-icon.png
twitter:
  card: summary_large_image
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-image.png

# Theme
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-last-modified-at

# Navigation - Disabled default header_pages to use custom Bootstrap navigation
# header_pages:
#   - index.md
#   - essentials.md
#   - advanced.md
#   - network.md
#   - copilot.md

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections for organizing content
collections:
  examples:
    output: true
    permalink: /:collection/:name/

# Include/exclude files
include:
  - _pages
exclude:
  - README.md
  - LICENSE
  - CODE_OF_CONDUCT.md
  - SECURITY.md
  - SUPPORT.md
  - "*.Rproj"
  - .gitignore
  - frontier-analytics
