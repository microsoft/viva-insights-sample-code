<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/site.css" | relative_url }}">
  {%- if page.css -%}
  <link rel="stylesheet" href="{{ page.css | relative_url }}">
  {%- endif -%}

  {%- comment -%} Viva Insights branding: favicon + theme colour {%- endcomment -%}
  <link rel="icon" type="image/svg+xml" href="{{ "/assets/images/favicon.svg" | relative_url }}">
  <link rel="alternate icon" type="image/png" href="{{ "/assets/images/favicon-32.png" | relative_url }}">
  <link rel="apple-touch-icon" href="{{ "/assets/images/apple-touch-icon.png" | relative_url }}">
  <meta name="theme-color" content="#5C2D91">

  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
</head>
